<!DOCTYPE html>
<html>
<head>
  <title>Mini Among Us</title>
  <style>
    body { margin: 0; overflow: hidden; background: black; }
    #player {
      width: 40px;
      height: 40px;
      background: red;
      position: absolute;
      top: 100px;
      left: 100px;
    }
    .npc {
      width: 40px;
      height: 40px;
      background: blue;
      position: absolute;
    }
  </style>
</head>
<body>

<div id="player"></div>

<div class="npc" style="top:200px; left:200px;"></div>
<div class="npc" style="top:300px; left:400px;"></div>

<script>
  let player = document.getElementById("player");
  let x = 100;
  let y = 100;

  document.addEventListener("keydown", function(e) {
    if (e.key === "ArrowUp") y -= 10;
    if (e.key === "ArrowDown") y += 10;
    if (e.key === "ArrowLeft") x -= 10;
    if (e.key === "ArrowRight") x += 10;

    player.style.top = y + "px";
    player.style.left = x + "px";
  });
</script>

</body>
</html>
